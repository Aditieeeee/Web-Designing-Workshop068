!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Result Calculator</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Student Result Calculator</h1>

<label>Enter Number of Subjects:</label>
<input type="number" id="subjects">

<button onclick="calculateResult()">Enter Marks</button>

<div id="result"></div>

</div>


<script>

function calculateResult(){

let n = document.getElementById("subjects").value;

if(n <= 0){
alert("Enter valid number of subjects");
return;
}

let total = 0;

for(let i=1; i<=n; i++){

let marks = Number(prompt("Enter marks for Subject " + i));

total += marks;
}

let average = total / n;

let grade;
let status;

if(average >= 90){
grade="A+";
}
else if(average >=75){
grade="A";
}
else if(average >=60){
grade="B";
}
else if(average >=50){
grade="C";
}
else{
grade="F";
}

if(average >=40){
status="PASS";
}
else{
status="FAIL";
}

document.getElementById("result").innerHTML =
`
<h3>Total Marks: ${total}</h3>
<h3>Average Marks: ${average.toFixed(2)}</h3>
<h3>Grade: ${grade}</h3>
<h3>Result: ${status}</h3>
`;

}

</script>

</body>
</html>
